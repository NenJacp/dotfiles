# Configuración de Kitty con tema Oxocarbon
# Archivo: ~/.config/kitty/kitty.conf

# === FUENTE ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 10.0

# === CURSOR ===
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# === SCROLLBACK ===
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# === MOUSE ===
mouse_hide_wait 3.0
url_color #0f62fe
url_style curly
open_url_with default
url_prefixes http https file ftp gemini irc gopher mailto news git
detect_urls yes

# === RENDIMIENTO ===
repaint_delay 10
input_delay 3
sync_to_monitor yes

# === CAMPANA ===
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes
command_on_bell none

# === VENTANA ===
remember_window_size  yes
initial_window_width  140c
initial_window_height 35c
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0.5pt
draw_minimal_borders yes
window_margin_width 2
window_padding_width 4
placement_strategy center
hide_window_decorations no

# === PESTAÑAS ===
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style fade
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_powerline_style angled
tab_activity_symbol none
tab_title_template "{title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}"

# === COLORES OXOCARBON ===

# Colores básicos
foreground #f2f4f8
background #161616
background_opacity 1
background_blur 0

# Cursor
cursor #FE0F73
cursor_text_color #FE0F73

# Selección
selection_foreground #161616
selection_background #0f62fe

# Colores normales (0-7)
color0 #262626
color1 #ee5396
color2 #42be65
color3 #ffe97b
color4 #33b1ff
color5 #be95ff
color6 #08bdba
color7 #f2f4f8

# Colores brillantes (8-15)
color8  #393939
color9  #ff7eb6
color10 #6fdc8c
color11 #ffab91
color12 #78a9ff
color13 #d4bbff
color14 #3ddbd9
color15 #ffffff

# Colores de pestañas
active_tab_foreground   #161616
active_tab_background   #0f62fe
active_tab_font_style   bold
inactive_tab_foreground #f2f4f8
inactive_tab_background #262626
inactive_tab_font_style normal

# Bordes de ventana
active_border_color   #0f62fe
inactive_border_color #393939
bell_border_color     #ee5396

# === ATAJOS DE TECLADO ===

# Limpiar todos los atajos por defecto
clear_all_shortcuts yes

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert paste_from_selection
map ctrl+shift+s paste_from_selection

# Tamaño de fuente
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+plus      change_font_size all +2.0
map ctrl+shift+kp_add    change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+kp_subtract change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Scrollback
map ctrl+shift+up        scroll_line_up
map ctrl+shift+k         scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback

# Ventanas
map ctrl+shift+enter    new_window
map ctrl+shift+n        new_os_window
map ctrl+shift+w        close_window
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f        move_window_forward
map ctrl+shift+b        move_window_backward
map ctrl+shift+`        move_window_to_top
map ctrl+shift+r        start_resizing_window
map ctrl+shift+1        first_window
map ctrl+shift+2        second_window
map ctrl+shift+3        third_window
map ctrl+shift+4        fourth_window
map ctrl+shift+5        fifth_window
map ctrl+shift+6        sixth_window
map ctrl+shift+7        seventh_window
map ctrl+shift+8        eighth_window
map ctrl+shift+9        ninth_window
map ctrl+shift+0        tenth_window

# Pestañas
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward
map ctrl+shift+alt+t    set_tab_title

# Layouts
map ctrl+shift+l next_layout

# Otros
map ctrl+shift+f11      toggle_fullscreen
map ctrl+shift+f10      toggle_maximized
map ctrl+shift+u        kitten unicode_input
map ctrl+shift+f2       edit_config_file
map ctrl+shift+escape   kitty_shell window

# === CONFIGURACIONES AVANZADAS ===
shell .
editor .
close_on_child_death no
allow_remote_control no
update_check_interval 24
startup_session none
clipboard_control write-clipboard write-primary
allow_hyperlinks yes
term xterm-kittyerm xterm-kitty
